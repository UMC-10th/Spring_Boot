spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:~/h2/umc10th;MODE=MySQL
    username: sa
    password: 

  jpa:
    database: h2
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true


